<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin – Scenarios</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 0.5rem 1rem; text-align: left; vertical-align: top; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>
<h1>Scenarios</h1>
<table>
    <thead>
    <tr>
        <th>Context</th>
        <th>Question</th>
        <th>Option A</th>
        <th>Option B</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="scenario : ${scenarios}">
        <td th:text="${scenario.context}"></td>
        <td th:text="${scenario.question}"></td>
        <td th:text="${scenario.optionA.label}"></td>
        <td th:text="${scenario.optionB.label}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
