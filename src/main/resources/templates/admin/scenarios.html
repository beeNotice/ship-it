<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Scenarios</title>
    <style>
        body { font-family: sans-serif; margin: 2rem; }
        h1 { margin-bottom: 1rem; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 0.5rem 1rem; text-align: left; vertical-align: top; }
        th { background-color: #f0f0f0; }
        tr:nth-child(even) { background-color: #fafafa; }
    </style>
</head>
<body>
<h1>Scenarios</h1>
<table>
    <thead>
    <tr>
        <th>#</th>
        <th>Context</th>
        <th>Question</th>
        <th>Option A</th>
        <th>Option B</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="scenario, stat : ${scenarios}">
        <td th:text="${stat.count}"></td>
        <td th:text="${scenario.context}"></td>
        <td th:text="${scenario.question}"></td>
        <td th:text="${scenario.optionA.label}"></td>
        <td th:text="${scenario.optionB.label}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
